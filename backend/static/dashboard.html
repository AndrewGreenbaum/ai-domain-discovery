<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Domain Discovery - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #3b82f6;
        }

        .section {
            background: #1e293b;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .section-header {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .domain-table {
            width: 100%;
            border-collapse: collapse;
        }

        .domain-table th {
            text-align: left;
            padding: 12px;
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .domain-table td {
            padding: 16px 12px;
            border-bottom: 1px solid #334155;
        }

        .domain-table tr:hover {
            background: #334155;
        }

        .domain-name {
            font-weight: 600;
            color: #60a5fa;
            font-size: 16px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-live {
            background: #166534;
            color: #86efac;
        }

        .badge-down {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .badge-redirect {
            background: #713f12;
            color: #fcd34d;
        }

        .score {
            font-weight: 700;
            font-size: 18px;
        }

        .score-high {
            color: #22c55e;
        }

        .score-med {
            color: #eab308;
        }

        .score-low {
            color: #ef4444;
        }

        .score-bar {
            width: 100px;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444 0%, #eab308 50%, #22c55e 100%);
            transition: width 0.3s ease;
        }

        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #2563eb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .component-scores {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .time {
            color: #64748b;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Domain Discovery Dashboard</h1>
        <p>Real-time monitoring of newly discovered .ai domains</p>
    </div>

    <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh Data</button>

    <div id="error" class="error" style="display: none;"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Domains</h3>
            <div class="value" id="stat-total">-</div>
        </div>
        <div class="stat-card">
            <h3>Live Domains</h3>
            <div class="value" id="stat-live">-</div>
        </div>
        <div class="stat-card">
            <h3>High Quality (≥70)</h3>
            <div class="value" id="stat-high">-</div>
        </div>
        <div class="stat-card">
            <h3>Avg Score</h3>
            <div class="value" id="stat-avg">-</div>
        </div>
        <div class="stat-card">
            <h3>Redirects</h3>
            <div class="value" id="stat-redirects">-</div>
        </div>
        <div class="stat-card">
            <h3>Parking Pages</h3>
            <div class="value" id="stat-parking">-</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            🚀 Recent Discoveries (<span id="domain-count">0</span> domains)
        </div>
        <div id="loading" class="loading">Loading domains...</div>
        <table class="domain-table" id="domains-table" style="display: none;">
            <thead>
                <tr>
                    <th>Domain</th>
                    <th>Status</th>
                    <th>Quality Score</th>
                    <th>Category</th>
                    <th>Discovered</th>
                </tr>
            </thead>
            <tbody id="domains-tbody">
            </tbody>
        </table>
    </div>

    <script>
        // Production backend on EC2
        const API_URL = 'http://44.221.89.157:8000/api';

        async function loadDashboard() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('domains-table').style.display = 'none';
                document.getElementById('error').style.display = 'none';

                // Fetch domains
                const response = await fetch(`${API_URL}/domains?limit=50`);
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const domains = await response.json();

                // Calculate stats
                const stats = {
                    total: domains.length,
                    live: domains.filter(d => d.is_live).length,
                    high: domains.filter(d => d.quality_score >= 70).length,
                    avg: domains.length > 0
                        ? (domains.reduce((sum, d) => sum + (d.quality_score || 0), 0) / domains.length).toFixed(1)
                        : 0,
                    redirects: domains.filter(d => d.is_redirect).length,
                    parking: domains.filter(d => d.is_parking).length
                };

                // Update stats
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-live').textContent = stats.live;
                document.getElementById('stat-high').textContent = stats.high;
                document.getElementById('stat-avg').textContent = stats.avg;
                document.getElementById('stat-redirects').textContent = stats.redirects;
                document.getElementById('stat-parking').textContent = stats.parking;
                document.getElementById('domain-count').textContent = stats.total;

                // Render domains table
                const tbody = document.getElementById('domains-tbody');
                tbody.innerHTML = '';

                domains.forEach(domain => {
                    const tr = document.createElement('tr');

                    // Domain name
                    const tdDomain = document.createElement('td');
                    tdDomain.innerHTML = `
                        <div class="domain-name">${domain.domain}</div>
                        ${getComponentScoresHTML(domain)}
                    `;
                    tr.appendChild(tdDomain);

                    // Status
                    const tdStatus = document.createElement('td');
                    let statusBadges = [];
                    if (domain.is_live) {
                        statusBadges.push('<span class="badge badge-live">●LIVE</span>');
                    } else {
                        statusBadges.push('<span class="badge badge-down">●DOWN</span>');
                    }
                    if (domain.is_redirect) {
                        statusBadges.push(`<span class="badge badge-redirect">REDIRECT</span>`);
                    }
                    tdStatus.innerHTML = statusBadges.join(' ');
                    tr.appendChild(tdStatus);

                    // Quality score
                    const tdScore = document.createElement('td');
                    const score = domain.quality_score || 0;
                    const scoreClass = score >= 70 ? 'score-high' : score >= 40 ? 'score-med' : 'score-low';
                    tdScore.innerHTML = `
                        <span class="score ${scoreClass}">${score}</span>
                        <div class="score-bar">
                            <div class="score-bar-fill" style="width: ${score}%"></div>
                        </div>
                    `;
                    tr.appendChild(tdScore);

                    // Category
                    const tdCategory = document.createElement('td');
                    tdCategory.textContent = domain.category || 'N/A';
                    tr.appendChild(tdCategory);

                    // Discovered time
                    const tdTime = document.createElement('td');
                    tdTime.className = 'time';
                    tdTime.textContent = formatTimeAgo(domain.discovered_at);
                    tr.appendChild(tdTime);

                    tbody.appendChild(tr);
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('domains-table').style.display = 'table';

            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('error').textContent = `Error: ${error.message}. Make sure the backend is running on port 8000.`;
                document.getElementById('error').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }

        function getComponentScoresHTML(domain) {
            const scores = [];
            if (domain.domain_quality_score) scores.push(`Domain: ${Math.round(domain.domain_quality_score)}`);
            if (domain.launch_readiness_score) scores.push(`Launch: ${Math.round(domain.launch_readiness_score)}`);
            if (domain.content_originality_score) scores.push(`Orig: ${Math.round(domain.content_originality_score)}`);
            if (domain.professional_setup_score) scores.push(`Prof: ${Math.round(domain.professional_setup_score)}`);

            return scores.length > 0
                ? `<div class="component-scores">${scores.join(' | ')}</div>`
                : '';
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'Unknown';

            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffSecs = Math.floor(diffMs / 1000);
            const diffMins = Math.floor(diffSecs / 60);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffSecs < 60) return `${diffSecs}s ago`;
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            return `${diffDays}d ago`;
        }

        // Load on page load
        loadDashboard();

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
